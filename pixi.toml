[workspace]
authors = ["y39xiang <y39xiang@uwaterloo.ca>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[tasks]
deliverable_1_pipeline = 'python "src/Player Performance Analysis/player_performance_graphs.py" && python "src/Player Performance Analysis/player_radar_chart.py" && python "src/Player_Performance_Clustering/Clustering_Result.py"'

deliverable_2_pipeline = 'python "src/Player Archetypes Analysis/02_build_macro_archetype_table.py" && python "src/Player Archetypes Analysis/05_cluster_shot_embeddings.py" && python "src/Player Archetypes Analysis/06_build_identity_drift.py" && python "src/Player Archetypes Analysis/07_build_comps.py" && python "src/Player Archetypes Analysis/08_assemble_player_archetype_profiles.py" && python "src/Player Archetypes Analysis/11_build_practical_player_dossiers.py"'

deliverable_3_pipeline = 'python "src/Salary Decision Support/build_deliverable3_block1_workflow_patched.py" && python "src/Salary Decision Support/02_build_market_anchor_band.py" && python "src/Salary Decision Support/03_build_provisional_decision_inputs.py" && python "src/Salary Decision Support/04_assemble_provisional_decision_cards.py" && python "src/Salary Decision Support/07_build_salary_reconciliation_layer.py" && python "src/Salary Decision Support/08_build_interim_extension_guidance_patched.py" && python "src/Salary Decision Support/09_build_staged_extension_framework_patched.py" && python "src/Salary Decision Support/10_write_framework_completion_note_patched.py" && python "src/5th_Year_Salary_Analysis/Salary_Forecast.py"'

render_report = 'quarto render "report/Report.qmd" --to pdf'

[dependencies]
python = "3.12.*"
quarto = ">=1.8.27,<2"
numpy = ">=2.4.3,<3"
pandas = ">=3.0.2,<4"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.17.1,<2"
scikit-learn = ">=1.8.0,<2"
pytorch = ">=2.10.0,<3"
seaborn = ">=0.13.2,<0.14"
joblib = ">=1.5.3,<2"
requests = ">=2.33.1,<3"
python-dateutil = ">=2.9.0.post0,<3"
playwright = ">=1.59.1,<2"
r-base = ">=4.5.3,<4.6"
r-rmarkdown = ">=2.31,<3"
r-kableextra = ">=1.4.0,<2"
tqdm = ">=4.67.3,<5"
r-readr = ">=2.2.0,<3"
r-tidyverse = ">=2.0.0,<3"
tabulate = ">=0.10.0,<0.11"

[pypi-dependencies]
nba-api = ">=1.11.4, <2"
