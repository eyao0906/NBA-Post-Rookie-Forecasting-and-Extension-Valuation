name: generate_report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        # We install TinyTeX here
        with:
          tinytex: true

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          run-install: true
          locked: true
          cache: true 

      - name: Build PDF slides
        run: pixi run render_report
        env:
          QUARTO_TINYTEX_PATH: /home/runner/bin/tinytex

      - name: Upload PDF slides
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: report/Report.pdf
      
      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add report/Report.pdf
          # The '|| exit 0' prevents the workflow from failing if there are no changes
          git commit -m "Automated render of Report.pdf" || exit 0
          git push
